name: CI

on:
  push:
    branches: ['main']
  pull_request:
    branches: ['main']

jobs:
  ci:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        node-version: [22.x, 24.x]

    steps:
      - uses: actions/checkout@v4

      - uses: voidzero-dev/setup-vp@v1
        with:
          node-version: ${{ matrix.node-version }}
          cache: true

      - name: Install dependencies
        run: vp install --frozen-lockfile

      - name: Format
        run: vp fmt --check

      - name: Lint
        run: vp lint

      - name: Type check
        run: pnpm run check

      - name: Build
        run: vp build

      - name: Test
        run: vp test
